name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: SSH Deploy → Hostinger
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy via rsync over SSH
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzr --delete --exclude='.git*' --exclude='.DS_Store' --exclude='node_modules/' --exclude='README.md' --exclude='BRAND-KIT.md' --exclude='DEPLOY-GUIDE.md' --exclude='*.doc'
          path: ./
          remote_path: /home/${{ secrets.SSH_USERNAME }}/htdocs/${{ secrets.SSH_HOST }}/
          remote_host: ${{ secrets.SSH_HOST }}
          remote_port: ${{ secrets.SSH_PORT }}
          remote_user: ${{ secrets.SSH_USERNAME }}
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}
