<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal Cliente RBI — Amcol Ingeniería Ltda</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ===== VARIABLES — LIGHT THEME ===== */
:root {
  --red:           #CC1414;
  --red-hot:       #B01010;
  --red-dim:       rgba(204,20,20,0.08);
  --ink:           #F4F4F6;   /* fondo principal — gris muy claro */
  --steel:         #FFFFFF;   /* superficies / cards — blanco */
  --steel-light:   #EDEDF0;   /* hover */
  --wire:          #E2E2E8;   /* bordes */
  --chalk:         #18181B;   /* texto principal — casi negro */
  --smoke:         #6B6B7A;   /* texto secundario */
  --white:         #FFFFFF;
  --risk-critical: #CC1414;
  --risk-high:     #D95C10;
  --risk-medium:   #C49800;
  --risk-low:      #158A40;
  --risk-vlow:     #1272A0;
  --sidebar-w:     240px;
  --sidebar-col-w: 60px;
  --topbar-h:      56px;
  --tr:            200ms ease;
}

/* ===== RESET ===== */
*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  background: var(--ink);
  color: var(--chalk);
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  line-height: 1.5;
  overflow: hidden;
}
#root { height: 100vh; display: flex; }

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: var(--ink); }
::-webkit-scrollbar-thumb { background: #C8C8D4; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--smoke); }

/* ===== LAYOUT ===== */
.app-shell { display: flex; height: 100vh; width: 100%; overflow: hidden; }
.main      { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
.content   { flex: 1; overflow-y: auto; padding: 24px; }

/* ===== SIDEBAR ===== */
.sidebar {
  width: var(--sidebar-w);
  min-width: var(--sidebar-w);
  height: 100vh;
  background: var(--steel);
  border-right: 1px solid var(--wire);
  display: flex;
  flex-direction: column;
  transition: width var(--tr), min-width var(--tr);
  overflow: hidden;
  z-index: 100;
  flex-shrink: 0;
}
.sidebar.collapsed {
  width: var(--sidebar-col-w);
  min-width: var(--sidebar-col-w);
}

.sb-logo {
  padding: 0 16px;
  height: 64px;
  min-height: 64px;
  border-bottom: 1px solid var(--wire);
  display: flex;
  align-items: center;
  gap: 12px;
}
.sb-logo-icon {
  width: 32px; height: 32px; min-width: 32px;
  background: var(--red);
  border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
}
.sb-logo-text { overflow: hidden; }
.sb-logo-name {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 900; font-size: 18px;
  color: var(--chalk); white-space: nowrap; line-height: 1.1;
}
.sb-logo-sub {
  font-family: 'DM Mono', monospace;
  font-size: 9px; color: var(--smoke);
  text-transform: uppercase; letter-spacing: .06em;
  white-space: nowrap;
}

.sb-nav { flex: 1; overflow-y: auto; padding: 6px 0; }

.sb-group-label {
  padding: 14px 16px 4px;
  font-family: 'DM Mono', monospace;
  font-size: 9px; font-weight: 500;
  color: var(--smoke);
  letter-spacing: .10em; text-transform: uppercase;
  white-space: nowrap; overflow: hidden;
  transition: opacity var(--tr), height var(--tr), padding var(--tr);
}
.sidebar.collapsed .sb-group-label {
  opacity: 0; height: 0; padding: 0;
}

.nav-item {
  display: flex; align-items: center; gap: 12px;
  padding: 9px 16px;
  cursor: pointer;
  color: var(--smoke);
  transition: background var(--tr), color var(--tr), border-color var(--tr);
  border-left: 2px solid transparent;
  white-space: nowrap; overflow: hidden;
  user-select: none;
}
.nav-item:hover  { background: var(--steel-light); color: var(--chalk); }
.nav-item.active { background: var(--red-dim); color: var(--red); border-left-color: var(--red); font-weight: 600; }
.nav-icon        { width: 18px; height: 18px; min-width: 18px; flex-shrink: 0; }
.nav-label       { font-size: 14px; }

.sb-footer {
  border-top: 1px solid var(--wire);
  padding: 12px 0;
}
.sb-user {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 16px;
  overflow: hidden;
}
.sb-avatar {
  width: 30px; height: 30px; min-width: 30px;
  background: var(--wire);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: 'DM Mono', monospace;
  font-size: 10px; font-weight: 500;
  color: var(--chalk);
}
.sb-user-info { overflow: hidden; }
.sb-user-name { font-size: 12px; font-weight: 500; color: var(--chalk); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sb-user-role { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--smoke); text-transform: uppercase; }

/* ===== TOPBAR ===== */
.topbar {
  height: var(--topbar-h);
  min-height: var(--topbar-h);
  background: var(--steel);
  border-bottom: 1px solid var(--wire);
  display: flex; align-items: center;
  padding: 0 20px; gap: 12px;
}
.topbar-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 20px; font-weight: 700;
  color: var(--chalk); flex: 1;
}
.topbar-badge {
  padding: 3px 10px;
  border: 1px solid var(--wire);
  border-radius: 2px;
  font-family: 'DM Mono', monospace;
  font-size: 10px; color: var(--smoke);
  white-space: nowrap;
}
.topbar-date {
  font-family: 'DM Mono', monospace;
  font-size: 11px; color: var(--smoke);
  white-space: nowrap;
}

/* ===== BUTTONS ===== */
.btn {
  padding: 8px 16px;
  border-radius: 4px;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px; font-weight: 500;
  cursor: pointer; border: none;
  transition: background var(--tr), color var(--tr);
  display: inline-flex; align-items: center; gap: 6px;
  white-space: nowrap;
}
.btn-primary { background: var(--red); color: var(--white); }
.btn-primary:hover { background: var(--red-hot); }
.btn-ghost {
  background: transparent; color: var(--smoke);
  border: 1px solid var(--wire);
}
.btn-ghost:hover { background: var(--steel-light); color: var(--chalk); border-color: var(--smoke); }
.btn-icon {
  background: transparent; color: var(--smoke);
  padding: 6px; border-radius: 4px; border: none;
  cursor: pointer; display: flex; align-items: center;
  transition: background var(--tr), color var(--tr);
}
.btn-icon:hover { background: var(--steel-light); color: var(--chalk); }
.btn-sm { padding: 4px 10px; font-size: 11px; }

/* ===== CARDS ===== */
.card {
  background: var(--steel);
  border: 1px solid var(--wire);
  border-radius: 6px; padding: 20px;
}
.card-sm { padding: 14px; }

/* KPI Card */
.kpi-card {
  background: var(--steel);
  border: 1px solid var(--wire);
  border-left: 3px solid var(--red);
  border-radius: 6px; padding: 18px 20px;
  display: flex; align-items: flex-start; gap: 14px;
}
.kpi-icon-wrap {
  width: 38px; height: 38px; min-width: 38px;
  background: var(--red-dim);
  border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
}
.kpi-value {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 34px; font-weight: 900;
  color: var(--chalk); line-height: 1;
}
.kpi-label {
  font-family: 'DM Mono', monospace;
  font-size: 10px; color: var(--smoke);
  text-transform: uppercase; letter-spacing: .05em;
  margin-top: 3px;
}

/* ===== TABLES ===== */
.tbl-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 14px; }
thead th {
  background: var(--ink);
  padding: 9px 12px;
  text-align: left;
  font-family: 'DM Mono', monospace;
  font-size: 10px; font-weight: 500;
  color: var(--smoke);
  text-transform: uppercase; letter-spacing: .05em;
  border-bottom: 1px solid var(--wire);
  white-space: nowrap;
}
tbody tr { border-bottom: 1px solid var(--wire); transition: background var(--tr); }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: var(--steel-light); }
tbody td { padding: 9px 12px; color: var(--chalk); vertical-align: middle; }

/* ===== BADGES ===== */
.badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 7px;
  border-radius: 2px;
  font-family: 'DM Mono', monospace;
  font-size: 11px; font-weight: 500;
  text-transform: uppercase; letter-spacing: .04em;
  white-space: nowrap;
}
/* Risk — colores sólidos para fondo claro */
.b-critical  { background:#FDEAEA; color:#A80E0E; border:1px solid #F0AAAA; }
.b-high      { background:#FEF0E6; color:#A03A08; border:1px solid #F0C090; }
.b-med-high  { background:#FEFAE6; color:#856800; border:1px solid #E8D080; }
.b-medium    { background:#FEFAE6; color:#856800; border:1px solid #E8D080; }
.b-low       { background:#E8F5EE; color:#0E7034; border:1px solid #90D0AA; }
.b-vlow      { background:#E6F2FA; color:#0A5A80; border:1px solid #88C0D8; }
/* Status */
.b-aceptable  { background:#E8F5EE; color:#0E7034; border:1px solid #90D0AA; }
.b-observ     { background:#FEFAE6; color:#856800; border:1px solid #E8D080; }
.b-rechazo    { background:#FDEAEA; color:#A80E0E; border:1px solid #F0AAAA; }
.b-activo     { background:#E8F5EE; color:#0E7034; border:1px solid #90D0AA; }
.b-maint      { background:#FEFAE6; color:#856800; border:1px solid #E8D080; }
.b-fuera      { background:#FDEAEA; color:#A80E0E; border:1px solid #F0AAAA; }
.b-programada { background:#E6F2FA; color:#0A5A80; border:1px solid #88C0D8; }
.b-vencida    { background:#FDEAEA; color:#A80E0E; border:1px solid #F0AAAA; }
.b-por-prog   { background:#F2F2F4; color:#6B6B7A; border:1px solid #C8C8D4; }
.b-info       { background:#E6F2FA; color:#0A5A80; border:1px solid #88C0D8; }
/* Techniques */
.b-ut-esp  { background:#E6F2FA; color:#0A5A80; border:1px solid #88C0D8; }
.b-rt-dig  { background:#FEF0E6; color:#A03A08; border:1px solid #F0C090; }
.b-mt      { background:#F2E8FE; color:#6010A8; border:1px solid #C888F0; }
.b-pt      { background:#E8F5EE; color:#0E7034; border:1px solid #90D0AA; }
.b-paut    { background:#E6FAFA; color:#086878; border:1px solid #88D0D8; }
.b-met     { background:#FEFAE6; color:#856800; border:1px solid #E8D080; }
.b-vt-rem  { background:#F2F2F4; color:#6B6B7A; border:1px solid #C8C8D4; }
.b-ut-map  { background:#EAF0FE; color:#1832A0; border:1px solid #A0B8F0; }
.b-pmi-xrf { background:#FEE8F4; color:#980860; border:1px solid #F088C8; }

/* ===== PULSE ANIMATION ===== */
@keyframes pulse-anim {
  0%,100% { opacity:1; }
  50%      { opacity:0.45; }
}
.pulse { animation: pulse-anim 1.8s ease-in-out infinite; }

/* ===== PROGRESS BAR ===== */
.progress-wrap { width:80px; height:5px; background:var(--wire); border-radius:3px; overflow:hidden; }
.progress-fill { height:100%; border-radius:3px; }

/* ===== FILTERS ===== */
.filter-bar { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:16px; }
select, input[type="text"] {
  background: var(--steel);
  border: 1px solid var(--wire);
  border-radius: 4px;
  color: var(--chalk);
  padding: 7px 11px;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px; outline: none;
  transition: border-color var(--tr);
  cursor: pointer;
}
select:focus, input[type="text"]:focus { border-color: var(--smoke); }
input[type="text"]::placeholder { color: var(--smoke); }
option { background: var(--steel); }

/* ===== MODAL ===== */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.72);
  display: flex; align-items: center; justify-content: center;
  z-index: 1000; padding: 20px;
}
.modal {
  background: var(--steel);
  border: 1px solid var(--wire);
  border-radius: 8px;
  width: 100%; max-width: 700px;
  max-height: 88vh; overflow-y: auto;
}
.modal-header {
  padding: 18px 24px;
  border-bottom: 1px solid var(--wire);
  display: flex; align-items: flex-start;
  justify-content: space-between; gap: 16px;
  position: sticky; top: 0;
  background: var(--steel); z-index: 1;
}
.modal-body { padding: 24px; }

/* ===== TYPOGRAPHY HELPERS ===== */
.h1 { font-family:'Barlow Condensed',sans-serif; font-size:30px; font-weight:900; color:var(--chalk); line-height:1.1; }
.h2 { font-family:'Barlow Condensed',sans-serif; font-size:22px; font-weight:700; color:var(--chalk); }
.h3 { font-family:'Barlow Condensed',sans-serif; font-size:17px; font-weight:700; color:var(--chalk); }
.mono { font-family:'DM Mono',monospace; font-size:13px; }
.label-sm {
  font-family:'DM Mono',monospace; font-size:11px;
  color:var(--smoke); text-transform:uppercase;
  letter-spacing:.06em;
}
.sec-title {
  font-family:'Barlow Condensed',sans-serif;
  font-size:20px; font-weight:700; color:var(--chalk);
  margin-bottom:14px;
}
.sep { height:1px; background:var(--wire); margin:18px 0; }

/* ===== GRIDS ===== */
.g4 { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; }
.g3 { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; }
.g2 { display:grid; grid-template-columns:repeat(2,1fr); gap:14px; }
@media(max-width:1280px){ .g4{ grid-template-columns:repeat(2,1fr); } }
@media(max-width:900px) { .g4,.g3{ grid-template-columns:repeat(2,1fr); } }
@media(max-width:640px) { .g4,.g3,.g2{ grid-template-columns:1fr; } }

/* ===== LOGIN ===== */
.login-page {
  width:100%; min-height:100vh;
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
  display:flex; align-items:center; justify-content:center;
  padding:24px;
}
.login-card {
  background:#FFFFFF;
  border:1px solid var(--wire);
  border-radius:8px;
  width:100%; max-width:400px;
  padding:40px;
  box-shadow: 0 20px 60px rgba(0,0,0,.3);
}
.login-input {
  width:100%;
  background:var(--ink);
  border:1px solid var(--wire);
  border-radius:4px;
  color:var(--chalk);
  padding:11px 14px;
  font-family:'DM Sans',sans-serif;
  font-size:14px; outline:none;
  transition:border-color var(--tr);
}
.login-input:focus { border-color:var(--red); }
.login-error {
  background:rgba(204,20,20,.12);
  border:1px solid rgba(204,20,20,.30);
  border-radius:4px; padding:10px 14px;
  font-size:13px; color:#FF8888;
}

/* ===== TABS ===== */
.tab-bar {
  display:flex; gap:0;
  border-bottom:1px solid var(--wire);
  margin-bottom:18px;
  overflow-x:auto;
}
.tab {
  padding:9px 18px;
  cursor:pointer; color:var(--smoke);
  border-bottom:2px solid transparent;
  font-size:13px; font-weight:500;
  transition:color var(--tr), border-color var(--tr);
  white-space:nowrap;
}
.tab:hover  { color:var(--chalk); }
.tab.active { color:var(--red); border-bottom-color:var(--red); font-weight:600; }

/* ===== DETAIL GRID ===== */
.detail-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:12px; }
.detail-item {}
.detail-label { font-family:'DM Mono',monospace; font-size:10px; color:var(--smoke); text-transform:uppercase; letter-spacing:.06em; margin-bottom:2px; }
.detail-value { font-size:13px; color:var(--chalk); }

/* ===== ALERT ITEMS ===== */
.alert-item {
  display:flex; gap:14px;
  padding:14px 16px;
  border-radius:6px;
  border-left:3px solid var(--wire);
  margin-bottom:8px;
  background:var(--steel);
  transition:background var(--tr);
}
.alert-item:hover { background:var(--steel-light); }
.alert-critica    { border-left-color:var(--risk-critical); }
.alert-advertencia{ border-left-color:var(--risk-high); }
.alert-info       { border-left-color:var(--risk-vlow); }
.alert-resuelta   { border-left-color:var(--risk-low); opacity:.65; }

/* ===== ACTIVITY FEED ===== */
.activity-item {
  display:flex; gap:12px;
  padding:11px 0;
  border-bottom:1px solid var(--wire);
}
.activity-item:last-child { border-bottom:none; }
.act-dot {
  width:8px; height:8px; min-width:8px;
  border-radius:50%; margin-top:5px;
}

/* ===== MATRIX ===== */
.matrix-cell {
  border:1px solid rgba(0,0,0,.35);
  position:relative;
  display:flex; align-items:center; justify-content:center;
  flex-wrap:wrap; gap:3px; padding:4px;
  cursor:default; min-height:60px;
  transition:filter var(--tr);
}
.matrix-cell:hover { filter:brightness(1.25); }
.asset-dot {
  width:22px; height:22px;
  background:rgba(255,255,255,.88);
  border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-family:'DM Mono',monospace; font-size:7px; font-weight:500;
  color:var(--ink); cursor:pointer;
  position:relative;
}
.asset-dot:hover .dot-tip {
  display:block;
}
.dot-tip {
  display:none;
  position:absolute;
  bottom:calc(100% + 6px); left:50%;
  transform:translateX(-50%);
  background:var(--ink);
  border:1px solid var(--wire);
  border-radius:4px; padding:6px 10px;
  white-space:nowrap; font-size:11px;
  font-family:'DM Sans',sans-serif;
  color:var(--chalk); z-index:50;
  pointer-events:none;
}

/* ===== FORM ===== */
.form-group { margin-bottom:16px; }
.form-label {
  display:block;
  font-family:'DM Mono',monospace;
  font-size:10px; color:var(--smoke);
  text-transform:uppercase; letter-spacing:.06em;
  margin-bottom:5px;
}
.form-input {
  width:100%;
  background:var(--ink);
  border:1px solid var(--wire);
  border-radius:4px; color:var(--chalk);
  padding:9px 12px;
  font-family:'DM Sans',sans-serif;
  font-size:13px; outline:none;
  transition:border-color var(--tr);
}
.form-input:focus { border-color:var(--smoke); }
textarea.form-input { resize:vertical; min-height:80px; }

/* ===== RECHARTS CUSTOM ===== */
.recharts-cartesian-axis-tick-value {
  fill:var(--smoke) !important;
  font-family:'DM Mono',monospace !important;
  font-size:10px !important;
}
.recharts-legend-item-text {
  color:var(--chalk) !important;
  font-family:'DM Mono',monospace !important;
  font-size:10px !important;
}
.recharts-tooltip-wrapper .recharts-default-tooltip {
  background:var(--ink) !important;
  border:1px solid var(--wire) !important;
  border-radius:4px !important;
}

/* ===== MISC ===== */
.page { min-height:100%; }
.text-smoke { color:var(--smoke); }
.text-red   { color:var(--red); }
.text-white { color:var(--white); }
.fw-7 { font-weight:700; }
.mb-4 { margin-bottom:4px; }
.mb-8 { margin-bottom:8px; }
.mb-12{ margin-bottom:12px; }
.mb-16{ margin-bottom:16px; }
.mb-20{ margin-bottom:20px; }
.mb-24{ margin-bottom:24px; }
.flex  { display:flex; }
.flex-col { display:flex; flex-direction:column; }
.items-center { align-items:center; }
.justify-between { justify-content:space-between; }
.gap-8  { gap:8px; }
.gap-12 { gap:12px; }
.gap-16 { gap:16px; }

/* ===== PHOTO GALLERY ===== */
.photo-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(88px, 1fr));
  gap: 8px;
  margin-top: 8px;
}
.photo-thumb {
  position: relative;
  aspect-ratio: 1;
  border-radius: 6px;
  overflow: hidden;
  cursor: pointer;
  border: 1px solid var(--wire);
  background: var(--ink);
  transition: transform var(--tr), box-shadow var(--tr);
}
.photo-thumb:hover { transform: scale(1.04); box-shadow: 0 4px 16px rgba(0,0,0,.12); }
.photo-thumb img { width:100%; height:100%; object-fit:cover; display:block; }
.photo-thumb:hover .photo-del-btn { opacity:1; }
.photo-del-btn {
  position: absolute;
  top: 4px; right: 4px;
  width: 22px; height: 22px;
  background: rgba(0,0,0,.65);
  border: none;
  border-radius: 50%;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  opacity: 0;
  transition: opacity 150ms;
  color: #fff;
  font-size: 13px;
  line-height: 1;
  padding: 0;
}
.photo-thumb-caption {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  background: linear-gradient(transparent, rgba(0,0,0,.65));

  return m[t] || 'b-ut-esp';
}

function statusBadge(s) {
  return { activo:'b-activo', 'en-mantenimiento':'b-maint', 'fuera-de-servicio':'b-fuera' }[s] || 'b-activo';
}
function statusLabel(s) {
  return { activo:'Activo', 'en-mantenimiento':'En mantenimiento', 'fuera-de-servicio':'Fuera de servicio' }[s] || s;
}

function resultBadge(r) {
  return { aceptable:'b-aceptable', observacion:'b-observ', rechazo:'b-rechazo' }[r] || 'b-observ';
}
function resultLabel(r) {
  return { aceptable:'Aceptable', observacion:'Observación', rechazo:'Rechazo' }[r] || r;
}

function pctRemaining(a) {
  if (!a.tNom || !a.tAct || !a.tMin) return null;
  return Math.max(0, Math.min(100, ((a.tAct - a.tMin) / (a.tNom - a.tMin)) * 100));
}

function pctColor(p) {
  if (p === null) return '#888888';
  if (p < 20)  return '#CC1414';
  if (p < 45)  return '#E05C14';
  if (p < 65)  return '#E0B014';
  return '#14A84A';
}

function fmtDate(d) {
  if (!d) return '—';
  const [y,m,day] = d.split('-');
  const months = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  return `${parseInt(day)} ${months[parseInt(m)-1]} ${y}`;
}

function nowStr() {
  const d = new Date();
  const months = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  const days = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  return `${days[d.getDay()]}, ${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
}

function greet() {
  const h = new Date().getHours();
  if (h < 12) return 'Buenos días';
  if (h < 18) return 'Buenas tardes';
  return 'Buenas noches';
}

function useCounter(target, duration = 900) {
  const [n, setN] = useState(0);
  useEffect(() => {
    setN(0);
    if (target === 0) return;
    let start = 0;
    const step = target / (duration / 16);
    const t = setInterval(() => {
      start += step;
      if (start >= target) { setN(target); clearInterval(t); }
      else setN(Math.floor(start));
    }, 16);
    return () => clearInterval(t);
  }, [target]);
  return n;
}

      cells[`${p},${c}`] = assets.filter(a => a.pof === p && a.cof === c);

  return (
    <div>
      <div style={{ display:'flex', gap:4, marginBottom:4, paddingLeft:20 }}>

          {[5,4,3,2,1].map(c =>
            [1,2,3,4,5].map(p => {
              const z = getZone(p, c);
              const astsHere = cells[`${p},${c}`] || [];
              return (
                <div key={`${p},${c}`}
                  style={{
                    background: ZONE_BG[z],
                    border:'1px solid rgba(0,0,0,.25)',
                    borderRadius:2,
                    display:'flex', alignItems:'center', justifyContent:'center', flexWrap:'wrap',

        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:14 }}>

/* ===================== ASSET DETAIL MODAL ===================== */
function AssetDetailModal({ asset, inspections, assetPhotos, setAssetPhotos, onClose }) {
  const a = asset;
  const rb = riskBadge(a.pof, a.cof);
  const pct = pctRemaining(a);
  const history = inspections
    .filter(i => i.assetId === a.id)
    .sort((x,y) => y.date.localeCompare(x.date))
    .slice(0,3);
  const thk = THICKNESS_DATA[a.id];
  const photos = (assetPhotos && assetPhotos[a.id]) || [];
  const [lbIdx, setLbIdx] = useState(null);
  const fileRef = useRef(null);

  function handleFiles(e) {
    const files = Array.from(e.target.files);
    files.forEach(file => {
      const reader = new FileReader();
      reader.onload = ev => {
        const photo = {
          id: Date.now() + '_' + Math.random().toString(36).slice(2),
          url: ev.target.result,
          caption: file.name.replace(/\.[^.]+$/, ''),
          date: new Date().toISOString().slice(0,10),
        };
        setAssetPhotos(prev => ({
          ...prev,
          [a.id]: [...(prev[a.id] || []), photo],
        }));
      };
      reader.readAsDataURL(file);
    });
    e.target.value = '';
  }

  function deletePhoto(id) {
    setAssetPhotos(prev => ({
      ...prev,
      [a.id]: (prev[a.id] || []).filter(p => p.id !== id),
    }));
    if (lbIdx !== null) setLbIdx(null);
  }

  return (
    <div className="modal-overlay" onClick={e => { if(e.target===e.currentTarget) onClose(); }}>
      <div className="modal">
        {/* Header */}
        <div className="modal-header">
          <div>
            <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:4 }}>
              <span className="mono" style={{ color:'var(--smoke)' }}>{a.id}</span>
              <span className={`badge ${rb.cls}`}>
                {a.isCritical && <span className="pulse">●</span>} {rb.label}
              </span>
              <span className={`badge ${statusBadge(a.status)}`}>{statusLabel(a.status)}</span>
            </div>
            <div className="h2">{a.desc}</div>
            <div style={{ fontSize:12, color:'var(--smoke)', marginTop:2 }}>
              Circuito: {a.circuit} · Técnica habitual: {a.technique}
            </div>
          </div>
          <button className="btn-icon" onClick={onClose}><Icon name="X" size={18} /></button>
        </div>

        <div className="modal-body">
          {/* Datos técnicos */}
          <div className="label-sm mb-8">Datos Técnicos</div>
          <div className="detail-grid mb-16">
            <div className="detail-item"><div className="detail-label">Material</div><div className="detail-value">{a.material}</div></div>
            <div className="detail-item"><div className="detail-label">Tipo de equipo</div><div className="detail-value" style={{ textTransform:'capitalize' }}>{a.type}</div></div>
            <div className="detail-item"><div className="detail-label">Fluido contenido</div><div className="detail-value">{a.fluid}</div></div>
            <div className="detail-item"><div className="detail-label">Temperatura operación</div><div className="detail-value">{a.temp}</div></div>
            <div className="detail-item"><div className="detail-label">Presión operación</div><div className="detail-value">{a.pressure}</div></div>
            <div className="detail-item"><div className="detail-label">Circuito / Unidad</div><div className="detail-value">{a.circuit}</div></div>
          </div>

          {/* Espesores */}
          {a.tNom && (
            <>
              <div className="sep" />
              <div className="label-sm mb-8">Espesores (mm)</div>
              <div style={{ display:'flex', gap:20, flexWrap:'wrap', marginBottom:16 }}>
                {[
                  { label:'t Nominal', val:`${a.tNom} mm` },
                  { label:'t Actual',  val:`${a.tAct} mm`, highlight: a.tAct <= a.tMin },
                  { label:'t Mínimo',  val:`${a.tMin} mm` },
                ].map(row => (
                  <div key={row.label} style={{ textAlign:'center', padding:'10px 20px', background:'var(--ink)', borderRadius:4, border:'1px solid var(--wire)' }}>
                    <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:22, fontWeight:900,
                      color: row.highlight ? 'var(--risk-critical)' : 'var(--chalk)' }}>{row.val}</div>
                    <div className="label-sm">{row.label}</div>
                  </div>
                ))}
                {pct !== null && (
                  <div style={{ textAlign:'center', padding:'10px 20px', background:'var(--ink)', borderRadius:4, border:'1px solid var(--wire)' }}>
                    <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:22, fontWeight:900, color: pctColor(pct) }}>
                      {pct.toFixed(0)}%
                    </div>
                    <div className="label-sm">Vida remanente</div>
                  </div>
                )}
              </div>
              {a.tAct <= a.tMin && (
                <div style={{ background:'rgba(204,20,20,.12)', border:'1px solid rgba(204,20,20,.30)',
                  borderRadius:4, padding:'10px 14px', marginBottom:16, display:'flex', gap:10, alignItems:'center' }}>
                  <Icon name="Alert" size={16} color="var(--red)" />
                  <span style={{ fontSize:13, color:'#FF8888' }}>
                    <strong>Espesor crítico:</strong> El espesor actual ({a.tAct} mm) está por debajo del mínimo requerido ({a.tMin} mm). Requiere atención inmediata.
                  </span>
                </div>
              )}
              {thk && (
                <div style={{ fontSize:12, color:'var(--smoke)', marginBottom:8 }}>
                  Tasa de corrosión estimada: <span style={{ color:'var(--chalk)', fontFamily:"'DM Mono',monospace" }}>{thk.rate} mm/año</span> ·
                  Vida útil remanente: <span style={{ color: thk.life < 1 ? 'var(--risk-critical)' : 'var(--risk-medium)', fontFamily:"'DM Mono',monospace" }}>{thk.life > 0 ? `~${thk.life} años` : 'VENCIDA'}</span> ·
                  Reemplazo estimado: <span style={{ fontFamily:"'DM Mono',monospace" }}>{thk.replaceDate}</span>
                </div>
              )}
            </>
          )}

          {/* Inspecciones recientes */}
          <div className="sep" />
          <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:10 }}>
            <div className="label-sm">Últimas Inspecciones</div>
            {!history.length && <span style={{ color:'var(--smoke)', fontSize:12 }}>Sin registros</span>}
          </div>
          {history.map(insp => (
            <div key={insp.id} style={{
              display:'flex', alignItems:'center', gap:12, padding:'9px 0',
              borderBottom:'1px solid var(--wire)', flexWrap:'wrap'
            }}>
              <span className="mono" style={{ color:'var(--smoke)' }}>{fmtDate(insp.date)}</span>
              <span className={`badge ${techBadge(insp.technique)}`}>{insp.technique}</span>
              <span className={`badge ${resultBadge(insp.result)}`}>{resultLabel(insp.result)}</span>
              <span style={{ fontSize:12, color:'var(--smoke)', flex:1 }}>{insp.value}</span>
              <span style={{ fontSize:11, color:'var(--smoke)' }}>{insp.norm}</span>
            </div>
          ))}

          {/* Próxima */}
          <div className="sep" />
          <div style={{ display:'flex', gap:20, flexWrap:'wrap' }}>
            <div>
              <div className="label-sm mb-4">Última Inspección</div>
              <div className="mono">{fmtDate(a.lastInsp)}</div>
            </div>
            <div>
              <div className="label-sm mb-4">Próxima Inspección</div>
              <div className="mono" style={{ color: new Date(a.nextInsp) < new Date() ? 'var(--risk-critical)' : 'var(--chalk)' }}>
                {fmtDate(a.nextInsp)}
                {new Date(a.nextInsp) < new Date() && <span style={{ marginLeft:6, color:'var(--risk-critical)' }}>⚠ VENCIDA</span>}
              </div>
            </div>
            <div>
              <div className="label-sm mb-4">Técnica recomendada</div>
              <div><span className={`badge ${techBadge(a.technique)}`}>{a.technique}</span></div>
            </div>
            <div>
              <div className="label-sm mb-4">Posición en Matriz RBI</div>
              <div className="mono">PoF: {a.pof} · CoF: {a.cof}</div>
            </div>
          </div>

          {/* ── Fotografías ── */}
          <div className="sep" />
          <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:4 }}>
            <div className="label-sm">Fotografías del Activo</div>
            <span style={{ fontSize:11, color:'var(--smoke)' }}>{photos.length} foto{photos.length !== 1 ? 's' : ''}</span>
          </div>
          <input
            ref={fileRef}
            type="file"
            accept="image/*"
            multiple
            style={{ display:'none' }}
            onChange={handleFiles}
          />
          <div className="photo-grid">
            {photos.map((ph, idx) => (
              <div key={ph.id} className="photo-thumb" onClick={() => setLbIdx(idx)}>
                <img src={ph.url} alt={ph.caption} />
                <div className="photo-thumb-caption">{ph.caption}</div>
                <button
                  className="photo-del-btn"
                  title="Eliminar foto"
                  onClick={e => { e.stopPropagation(); deletePhoto(ph.id); }}
                >×</button>
              </div>
            ))}
            <button className="photo-add-btn" onClick={() => fileRef.current && fileRef.current.click()}>
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
                <polyline points="21 15 16 10 5 21"/>
              </svg>
              <span>Agregar foto</span>
            </button>
          </div>

          {/* Lightbox */}
          {lbIdx !== null && photos[lbIdx] && (
            <div className="photo-lightbox" onClick={e => { if(e.target === e.currentTarget) setLbIdx(null); }}>
              <button className="photo-lb-close" onClick={() => setLbIdx(null)}>×</button>
              {lbIdx > 0 && (
                <button className="photo-lb-nav photo-lb-prev" onClick={() => setLbIdx(i => i - 1)}>‹</button>
              )}
              {lbIdx < photos.length - 1 && (
                <button className="photo-lb-nav photo-lb-next" onClick={() => setLbIdx(i => i + 1)}>›</button>
              )}
              <div className="photo-lightbox-inner">
                <img src={photos[lbIdx].url} alt={photos[lbIdx].caption} />
                <div className="photo-lb-caption">{photos[lbIdx].caption}</div>
                <div className="photo-lb-meta">{a.id} · {photos[lbIdx].date}</div>
                {photos.length > 1 && (
                  <div className="photo-lb-counter">{lbIdx + 1} / {photos.length}</div>
                )}
                <button
                  style={{ marginTop:4, background:'rgba(204,20,20,.18)', border:'1px solid rgba(204,20,20,.35)', color:'#E06060', borderRadius:4, padding:'5px 14px', cursor:'pointer', fontSize:12 }}
                  onClick={() => deletePhoto(photos[lbIdx].id)}
                >Eliminar esta foto</button>
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

/* ===================== ASSET LIST ===================== */
function AssetList({ assets, inspections, setSelectedAsset }) {
  const [typeF,   setTypeF]   = useState('');
  const [riskF,   setRiskF]   = useState('');
  const [statusF, setStatusF] = useState('');
  const [search,  setSearch]  = useState('');

  const filtered = assets.filter(a => {
    const zone = getZone(a.pof, a.cof);
    const riskMatch = !riskF || riskF === zone ||
      (riskF === 'high' && zone === 'med-high');
    const typeMatch   = !typeF   || a.type === typeF;
    const statusMatch = !statusF || a.status === statusF;
    const s = search.toLowerCase();
    const searchMatch = !s || a.id.toLowerCase().includes(s) || a.desc.toLowerCase().includes(s);
    return riskMatch && typeMatch && statusMatch && searchMatch;
  });

  return (
    <div className="page">
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:16 }}>
        <div className="h2">Activos Registrados <span style={{ color:'var(--smoke)', fontWeight:400, fontSize:16 }}>({filtered.length})</span></div>
      </div>

      {/* Filters */}
      <div className="filter-bar">
        <input type="text" placeholder="Buscar por ID o descripción..." value={search}
          onChange={e => setSearch(e.target.value)} style={{ minWidth:240 }} />
        <select value={typeF} onChange={e => setTypeF(e.target.value)}>
          <option value="">Tipo: Todos</option>
          <option value="tuberia">Tuberías</option>
          <option value="recipiente">Recipientes a presión</option>
          <option value="caldera">Calderas</option>
          <option value="intercambiador">Intercambiadores</option>
          <option value="estructura">Estructuras</option>
          <option value="soldadura">Soldaduras</option>
        </select>
        <select value={riskF} onChange={e => setRiskF(e.target.value)}>
          <option value="">Riesgo: Todos</option>
          <option value="critical">Crítico</option>
          <option value="high">Alto / Med-Alto</option>
          <option value="medium">Medio</option>
          <option value="low">Bajo</option>
          <option value="vlow">Muy Bajo</option>
        </select>
        <select value={statusF} onChange={e => setStatusF(e.target.value)}>
          <option value="">Estado: Todos</option>
          <option value="activo">Activo</option>
          <option value="en-mantenimiento">En mantenimiento</option>
          <option value="fuera-de-servicio">Fuera de servicio</option>
        </select>
        {(typeF || riskF || statusF || search) &&
          <button className="btn btn-ghost btn-sm"
            onClick={() => { setTypeF(''); setRiskF(''); setStatusF(''); setSearch(''); }}>
            Limpiar filtros
          </button>
        }
      </div>

      <div className="card" style={{ padding:0 }}>
        <div className="tbl-wrap">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Descripción</th>
                <th>Circuito</th>
                <th>Material</th>
                <th>t nom.</th>
                <th>t act.</th>
                <th>% remanente</th>
                <th>Riesgo RBI</th>
                <th>Prox. Insp.</th>
                <th>Estado</th>
                <th></th>
              </tr>
            </thead>
            <tbody>
              {filtered.map(a => {
                const rb  = riskBadge(a.pof, a.cof);
                const pct = pctRemaining(a);
                const isOverdue = a.nextInsp && new Date(a.nextInsp) < new Date();
                return (
                  <tr key={a.id}>
                    <td>
                      <span className="mono">{a.id}</span>
                      {a.isCritical && <span className="pulse" style={{ color:'var(--red)', marginLeft:6 }}>●</span>}
                    </td>
                    <td style={{ maxWidth:200, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}
                      title={a.desc}>{a.desc}</td>
                    <td className="mono" style={{ color:'var(--smoke)' }}>{a.circuit}</td>
                    <td style={{ fontSize:12, color:'var(--smoke)' }}>{a.material}</td>
                    <td className="mono">{a.tNom ? `${a.tNom}` : '—'}</td>
                    <td className="mono" style={{ color: a.tAct && a.tMin && a.tAct <= a.tMin ? 'var(--risk-critical)' : 'var(--chalk)' }}>
                      {a.tAct ? `${a.tAct}` : '—'}
                    </td>
                    <td>
                      {pct !== null ? (
                        <div style={{ display:'flex', alignItems:'center', gap:8 }}>
                          <div className="progress-wrap">
                            <div className="progress-fill" style={{ width:`${pct}%`, background:pctColor(pct) }} />
                          </div>
                          <span style={{ fontFamily:"'DM Mono',monospace", fontSize:11, color:pctColor(pct) }}>{pct.toFixed(0)}%</span>
                        </div>
                      ) : <span style={{ color:'var(--smoke)' }}>—</span>}
                    </td>
                    <td><span className={`badge ${rb.cls}`}>{rb.label}</span></td>
                    <td className="mono" style={{ color: isOverdue ? 'var(--risk-critical)' : 'var(--smoke)', fontSize:11 }}>
                      {fmtDate(a.nextInsp)}
                      {isOverdue && <span style={{ marginLeft:4 }}>⚠</span>}
                    </td>
                    <td><span className={`badge ${statusBadge(a.status)}`}>{statusLabel(a.status)}</span></td>
                    <td>
                      <button className="btn-icon" onClick={() => setSelectedAsset(a)} title="Ver detalle">
                        <Icon name="Eye" size={14} />
                      </button>
                    </td>
                  </tr>
                );
              })}
              {filtered.length === 0 && (
                <tr><td colSpan={11} style={{ textAlign:'center', padding:32, color:'var(--smoke)' }}>
                  No se encontraron activos con los filtros seleccionados.
                </td></tr>
              )}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

/* ===================== INSPECTION HISTORY ===================== */
function InspectionHistory({ assets, inspections }) {
  const [techF,   setTechF]   = useState('');
  const [resultF, setResultF] = useState('');
  const [search,  setSearch]  = useState('');

  const TECHNIQUES = ['UT-ESP','RT-DIG','MT','PT','PAUT','MET','VT-REM','UT-MAP','PMI-XRF'];

  const filtered = [...inspections]
    .sort((a,b) => b.date.localeCompare(a.date))
    .filter(i => {
      const techMatch   = !techF   || i.technique === techF;
      const resultMatch = !resultF || i.result === resultF;
      const s = search.toLowerCase();
      const asset = assets.find(a => a.id === i.assetId);
      const searchMatch = !s || i.id.toLowerCase().includes(s) ||
        i.assetId.toLowerCase().includes(s) ||
        (asset?.desc || '').toLowerCase().includes(s) ||
        i.technician.toLowerCase().includes(s);
      return techMatch && resultMatch && searchMatch;
    });

  const totals = {
    aceptable:  inspections.filter(i => i.result === 'aceptable').length,
    observacion:inspections.filter(i => i.result === 'observacion').length,
    rechazo:    inspections.filter(i => i.result === 'rechazo').length,
  };

  return (
    <div className="page">
      {/* Summary */}
      <div className="g3 mb-20" style={{ gridTemplateColumns:'repeat(3,1fr)', maxWidth:600 }}>
        {[
          { label:'Aceptables',   val:totals.aceptable,   cls:'b-aceptable' },
          { label:'Observaciones',val:totals.observacion, cls:'b-observ'    },
          { label:'Rechazos',     val:totals.rechazo,     cls:'b-rechazo'   },
        ].map(row => (
          <div key={row.label} className="card card-sm" style={{ textAlign:'center' }}>
            <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:28, fontWeight:900, color:'var(--chalk)' }}>{row.val}</div>
            <div><span className={`badge ${row.cls}`} style={{ marginTop:4 }}>{row.label}</span></div>
          </div>
        ))}
      </div>

      {/* Filters */}
      <div className="filter-bar">
        <input type="text" placeholder="Buscar por ID, activo, técnico..." value={search}
          onChange={e => setSearch(e.target.value)} style={{ minWidth:240 }} />
        <select value={techF} onChange={e => setTechF(e.target.value)}>
          <option value="">Técnica: Todas</option>
          {TECHNIQUES.map(t => <option key={t} value={t}>{t}</option>)}
        </select>
        <select value={resultF} onChange={e => setResultF(e.target.value)}>
          <option value="">Resultado: Todos</option>
          <option value="aceptable">Aceptable</option>
          <option value="observacion">Observación</option>
          <option value="rechazo">Rechazo</option>
        </select>
        {(techF || resultF || search) &&
          <button className="btn btn-ghost btn-sm"
            onClick={() => { setTechF(''); setResultF(''); setSearch(''); }}>
            Limpiar
          </button>
        }
      </div>

      <div className="card" style={{ padding:0 }}>
        <div className="tbl-wrap">
          <table>
            <thead>
              <tr>
                <th>Fecha</th>
                <th>N° OT</th>
                <th>Activo</th>
                <th>Descripción</th>
                <th>Técnica</th>
                <th>Técnico</th>
                <th>Resultado</th>
                <th>Valor / Hallazgo</th>
                <th>Norma</th>
                <th></th>
              </tr>
            </thead>
            <tbody>
              {filtered.map(insp => {
                const asset = assets.find(a => a.id === insp.assetId);
                return (
                  <tr key={insp.id}>
                    <td className="mono" style={{ whiteSpace:'nowrap' }}>{fmtDate(insp.date)}</td>
                    <td className="mono" style={{ color:'var(--smoke)', fontSize:11 }}>{insp.id}</td>
                    <td className="mono">{insp.assetId}</td>

                );
              })}
              {filtered.length === 0 && (

                  No se encontraron inspecciones.
                </td></tr>
              )}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

/* ===================== SVG LINE CHART ===================== */
function ThicknessChart({ data, tMin, tAlert }) {
  const [tooltip, setTooltip] = useState(null);
  const W = 560, H = 260;
  const PAD = { top:24, right:60, bottom:36, left:58 };
  const cW = W - PAD.left - PAD.right;
  const cH = H - PAD.top  - PAD.bottom;

  const allVals = data.flatMap(d => [d.actual, d.projected].filter(v => v != null));
  const minY = Math.min(...allVals, tMin) - 0.4;
  const maxY = Math.max(...allVals) + 0.5;

  const sx = i  => PAD.left + (i / (data.length - 1)) * cW;
  const sy = v  => PAD.top  + cH - ((v - minY) / (maxY - minY)) * cH;

  const actualPts  = data.map((d,i) => d.actual    != null ? [sx(i), sy(d.actual)]    : null).filter(Boolean);
  const projPts    = data.map((d,i) => d.projected != null ? [sx(i), sy(d.projected)] : null).filter(Boolean);

  const toD = pts => pts.map((p,i) => `${i===0?'M':'L'}${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(' ');

  const tMinY   = sy(tMin);
  const tAlertY = sy(tAlert);

  // Y axis ticks
  const range = maxY - minY;
  const step  = range > 6 ? 2 : range > 3 ? 1 : 0.5;
  const yTicks = [];
  for (let v = Math.ceil(minY / step) * step; v <= maxY; v = parseFloat((v + step).toFixed(2))) {
    yTicks.push(v);
  }

  return (
    <div style={{ position:'relative' }}>
      <svg viewBox={`0 0 ${W} ${H}`} style={{ width:'100%', height:'auto', display:'block' }}>
        {/* Grid */}
        {yTicks.map(v => (
          <line key={v} x1={PAD.left} x2={PAD.left+cW} y1={sy(v)} y2={sy(v)}
            stroke="var(--wire)" strokeWidth={1} />
        ))}

        {/* t_alert zone fill */}
        <rect x={PAD.left} y={tAlertY} width={cW} height={tMinY - tAlertY}
          fill="rgba(217,92,16,.06)" />
        {/* t_min zone fill */}
        <rect x={PAD.left} y={tMinY} width={cW} height={PAD.top + cH - tMinY}
          fill="rgba(204,20,20,.07)" />

        {/* Reference lines */}
        <line x1={PAD.left} x2={PAD.left+cW} y1={tMinY}   y2={tMinY}
          stroke="#CC1414" strokeWidth={1.5} strokeDasharray="6,4" />
        <line x1={PAD.left} x2={PAD.left+cW} y1={tAlertY} y2={tAlertY}
          stroke="#D95C10" strokeWidth={1} strokeDasharray="4,3" />

        {/* Reference labels */}
        <text x={PAD.left+cW+4} y={tMinY+4}   fontSize={9} fill="#CC1414"
          fontFamily="'DM Mono',monospace">t_min {tMin}mm</text>
        <text x={PAD.left+cW+4} y={tAlertY+4} fontSize={9} fill="#D95C10"
          fontFamily="'DM Mono',monospace">alerta</text>

        {/* Projected line */}
        {projPts.length > 1 &&
          <path d={toD(projPts)} fill="none" stroke="#AAAAAA" strokeWidth={1.5} strokeDasharray="6,4" />
        }
        {/* Actual line */}
        {actualPts.length > 1 &&
          <path d={toD(actualPts)} fill="none" stroke="#1272A0" strokeWidth={2.5}
            strokeLinecap="round" strokeLinejoin="round" />
        }

        {/* Actual dots */}
        {data.map((d,i) => d.actual != null && (
          <circle key={`a${i}`} cx={sx(i)} cy={sy(d.actual)} r={5}
            fill="#1272A0" stroke="white" strokeWidth={2}
            style={{ cursor:'pointer' }}
            onMouseEnter={() => setTooltip({ x:sx(i), y:sy(d.actual), label:d.date, val:d.actual, type:'Medido' })}
            onMouseLeave={() => setTooltip(null)} />
        ))}
        {/* Projected dots */}
        {data.map((d,i) => d.projected != null && d.actual == null && (
          <circle key={`p${i}`} cx={sx(i)} cy={sy(d.projected)} r={4}
            fill="white" stroke="#AAAAAA" strokeWidth={1.5}
            style={{ cursor:'pointer' }}
            onMouseEnter={() => setTooltip({ x:sx(i), y:sy(d.projected), label:d.date, val:d.projected, type:'Proyectado' })}
            onMouseLeave={() => setTooltip(null)} />
        ))}

        {/* X axis labels */}
        {data.map((d,i) => (
          <text key={i} x={sx(i)} y={H - PAD.bottom + 16}
            textAnchor="middle" fontSize={9} fill="var(--smoke)"
            fontFamily="'DM Mono',monospace">{d.date}</text>
        ))}
        {/* Y axis labels */}
        {yTicks.map(v => (
          <text key={v} x={PAD.left - 6} y={sy(v)+3}
            textAnchor="end" fontSize={9} fill="var(--smoke)"
            fontFamily="'DM Mono',monospace">{v}mm</text>
        ))}

        {/* Axes */}
        <line x1={PAD.left} x2={PAD.left}      y1={PAD.top} y2={PAD.top+cH} stroke="var(--wire)" strokeWidth={1} />
        <line x1={PAD.left} x2={PAD.left+cW}   y1={PAD.top+cH} y2={PAD.top+cH} stroke="var(--wire)" strokeWidth={1} />

        {/* Tooltip */}
        {tooltip && (() => {
          const tx = tooltip.x > W * 0.7 ? tooltip.x - 110 : tooltip.x + 10;
          const ty = tooltip.y > H * 0.7 ? tooltip.y - 48  : tooltip.y + 10;
          return (
            <g>
              <rect x={tx} y={ty} width={105} height={42} rx={4}
                fill="white" stroke="var(--wire)" strokeWidth={1} />
              <text x={tx+8} y={ty+14} fontSize={10} fill="var(--smoke)"
                fontFamily="'DM Mono',monospace">{tooltip.label}</text>
              <text x={tx+8} y={ty+30} fontSize={11} fill="var(--chalk)"
                fontFamily="'DM Mono',monospace">{tooltip.type}: {tooltip.val?.toFixed(2)} mm</text>
            </g>
          );
        })()}
      </svg>

      {/* Legend */}
      <div style={{ display:'flex', gap:16, marginTop:8, paddingLeft:PAD.left }}>
        {[
          { color:'#1272A0', dash:false, label:'Medición real' },
          { color:'#AAAAAA', dash:true,  label:'Proyección' },
          { color:'#CC1414', dash:true,  label:`t_min (${tMin} mm)` },
          { color:'#D95C10', dash:true,  label:'Zona de alerta' },
        ].map(row => (
          <div key={row.label} style={{ display:'flex', alignItems:'center', gap:5 }}>
            <svg width={20} height={8}>
              <line x1={0} y1={4} x2={20} y2={4}
                stroke={row.color} strokeWidth={row.dash ? 1.5 : 2.5}
                strokeDasharray={row.dash ? '4,3' : 'none'} />
            </svg>
            <span style={{ fontFamily:"'DM Mono',monospace", fontSize:10, color:'var(--smoke)' }}>{row.label}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ===================== INSPECTION PLAN ===================== */

  const priorityOrder = { critica:0, alta:1, media:2, baja:3 };
  const sorted = [...plan].sort((a,b) => {
    const pdiff = priorityOrder[a.priority] - priorityOrder[b.priority];
    if (pdiff !== 0) return pdiff;
    return a.nextDate.localeCompare(b.nextDate);
  });

  const statusBadgeMap = {
    vencida:      'b-vencida',
    programada:   'b-programada',
    'por-programar':'b-por-prog',

    vencida:'Vencida', programada:'Programada', 'por-programar':'Por programar'

                <th>Descripción</th>
                <th>Técnica</th>
                <th>Frecuencia</th>
                <th>Última Insp.</th>
                <th>Próxima Insp.</th>
                <th>Estado</th>
                <th>Prioridad</th>
              </tr>
            </thead>
            <tbody>
              {sorted.map(row => {
                const asset = assets.find(a => a.id === row.assetId);
                const isOverdue = row.status === 'vencida';
                const pb = prioMap[row.priority] || prioMap['baja'];
                return (
                  <tr key={row.assetId}>
                    <td className="mono">{row.assetId}</td>
                    <td style={{ fontSize:12, maxWidth:160, overflow:'hidden',
                      textOverflow:'ellipsis', whiteSpace:'nowrap' }}
                      title={asset?.desc}>{asset?.desc || row.assetId}</td>
                    <td><span className={`badge ${techBadge(row.technique.split(' ')[0])}`}>{row.technique}</span></td>
                    <td style={{ fontSize:11, color:'var(--smoke)' }}>{row.frequency}</td>
                    <td className="mono" style={{ fontSize:11, color:'var(--smoke)' }}>{fmtDate(row.lastInsp)}</td>
                    <td className="mono" style={{ fontSize:11, color: isOverdue ? 'var(--risk-critical)' : 'var(--chalk)', fontWeight: isOverdue ? 700 : 400 }}>
                      {fmtDate(row.nextDate)}
                      {isOverdue && <span style={{ marginLeft:4 }}>⚠</span>}
                    </td>
                    <td><span className={`badge ${statusBadgeMap[row.status]}`}>{statusLabelMap[row.status]}</span></td>
                    <td><span className={`badge ${pb.cls}`}>{pb.label}</span></td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>

      {/* Simple Gantt 2024 */}
      <div className="card" style={{ padding:0 }}>
        <div style={{ padding:'14px 20px', borderBottom:'1px solid var(--wire)' }}>
          <div className="h3">Diagrama Gantt — 2024</div>
        </div>
        <div style={{ padding:'16px 20px', overflowX:'auto' }}>
          {/* Month headers */}
          <div style={{ display:'grid', gridTemplateColumns:'160px repeat(12,1fr)', gap:2, marginBottom:8 }}>
            <div />
            {MONTHS.map(m => (
              <div key={m} style={{ textAlign:'center', fontFamily:"'DM Mono',monospace",
                fontSize:9, color:'var(--smoke)', padding:'3px 0' }}>{m}</div>
            ))}
          </div>
          {/* Rows */}
          {sorted
            .filter(row => row.nextDate.startsWith('2024') || row.lastInsp?.startsWith('2024'))
            .map(row => {
              const asset    = assets.find(a => a.id === row.assetId);
              const month    = monthOf(row.nextDate);
              const pb       = prioMap[row.priority] || prioMap['baja'];
              const barColor = row.status === 'vencida' ? 'var(--risk-critical)' :
                               row.priority === 'alta' ? 'var(--risk-high)' :
                               row.priority === 'media' ? 'var(--risk-medium)' : 'var(--risk-low)';
              return (
                <div key={row.assetId} style={{ display:'grid',
                  gridTemplateColumns:'160px repeat(12,1fr)', gap:2, marginBottom:4 }}>
                  <div style={{ fontSize:11, overflow:'hidden', textOverflow:'ellipsis',
                    whiteSpace:'nowrap', paddingRight:8, color:'var(--chalk)' }}
                    title={asset?.desc || row.assetId}>
                    <span className="mono" style={{ color:'var(--smoke)' }}>{row.assetId}</span>
                  </div>
                  {MONTHS.map((m, mi) => (
                    <div key={m} style={{
                      height:20, borderRadius:2,
                      background: mi === month
                        ? barColor
                        : 'var(--wire)',
                      display:'flex', alignItems:'center', justifyContent:'center',
                      fontSize:8, fontFamily:"'DM Mono',monospace",
                      color: mi === month ? '#fff' : 'transparent',
                      opacity: mi === month ? 1 : 0.3,
                    }}>
                      {mi === month ? row.technique.split(' ')[0] : ''}
                    </div>
                  ))}
                </div>
              );
            })}
        </div>
      </div>
    </div>
  );
}

/* ===== PART 6: Alerts + Documents + Admin + App root ===== */

/* ===================== ALERTS ===================== */
function AlertsPanel({ assets, alerts, setAlerts, setSelectedAsset }) {
  const [filterType, setFilterType] = useState('all');

  const filteredAlerts = alerts.filter(a =>
    filterType === 'all' || a.type === filterType ||
    (filterType === 'resuelta' && a.status === 'resuelta')
  );

  const counts = {
    critica:    alerts.filter(a => a.type === 'critica'     && a.status === 'activa').length,
    advertencia:alerts.filter(a => a.type === 'advertencia' && a.status === 'activa').length,
    info:       alerts.filter(a => a.type === 'info'        && a.status === 'activa').length,
    resuelta:   alerts.filter(a => a.status === 'resuelta').length,
  };

  const ALERT_ICONS = {
    critica:'ShieldAlert', advertencia:'Alert', info:'Info', resuelta:'Check'
  };
  const ALERT_COLORS = {
    critica:'var(--risk-critical)', advertencia:'var(--risk-high)',
    info:'var(--risk-vlow)', resuelta:'var(--risk-low)'
  };

  function markResolved(id) {
    setAlerts(prev => prev.map(a => a.id === id ? { ...a, status:'resuelta' } : a));
  }

  return (
    <div className="page">
      {/* Summary */}
      <div className="g4 mb-20">
        {[
          { key:'critica',     label:'Críticas',     color:'var(--risk-critical)' },
          { key:'advertencia', label:'Advertencias',  color:'var(--risk-high)'     },
          { key:'info',        label:'Informativas',  color:'var(--risk-vlow)'     },
          { key:'resuelta',    label:'Resueltas',     color:'var(--risk-low)'      },
        ].map(row => (
          <div key={row.key} className="kpi-card" style={{ borderLeftColor: row.color,
            cursor:'pointer', opacity: filterType === row.key || filterType === 'all' ? 1 : 0.55 }}
            onClick={() => setFilterType(filterType === row.key ? 'all' : row.key)}>
            <div className="kpi-icon-wrap" style={{ background:`${row.color}18` }}>
              <Icon name={ALERT_ICONS[row.key]} size={18} color={row.color} />
            </div>
            <div>
              <div className="kpi-value" style={{ color: row.color, fontSize:28 }}>{counts[row.key]}</div>
              <div className="kpi-label">{row.label}</div>
            </div>
          </div>
        ))}
      </div>

      {/* Filter tabs */}
      <div className="tab-bar">
        {[
          { id:'all',         label:'Todas'       },
          { id:'critica',     label:'Críticas'    },
          { id:'advertencia', label:'Advertencias'},
          { id:'info',        label:'Informativas'},
          { id:'resuelta',    label:'Resueltas'   },
        ].map(tab => (
          <div key={tab.id} className={`tab${filterType===tab.id?' active':''}`}
            onClick={() => setFilterType(tab.id)}>{tab.label}</div>
        ))}
      </div>

      {filteredAlerts.length === 0 && (
        <div className="card" style={{ textAlign:'center', padding:40, color:'var(--smoke)' }}>
          No hay alertas en esta categoría.
        </div>
      )}

      {filteredAlerts.map(alert => {
        const asset  = assets.find(a => a.id === alert.assetId);
        const color  = ALERT_COLORS[alert.type];
        const icon   = ALERT_ICONS[alert.type];
        const isCrit = alert.type === 'critica' && alert.status === 'activa';
        return (
          <div key={alert.id} className={`alert-item alert-${alert.type}`}>
            <div style={{ marginTop:2 }}>
              <span className={isCrit ? 'pulse' : ''} style={{ color }}>
                <Icon name={icon} size={18} color={color} />
              </span>
            </div>
            <div style={{ flex:1 }}>
              <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:4, flexWrap:'wrap' }}>
                <span style={{ fontWeight:600, fontSize:14 }}>{alert.title}</span>
                {alert.status === 'resuelta' &&
                  <span className="badge b-aceptable">Resuelta</span>
                }
                {isCrit && <span className="badge b-critical pulse">CRÍTICA</span>}
              </div>
              <div style={{ fontSize:13, color:'var(--chalk)', marginBottom:6 }}>{alert.desc}</div>
              <div style={{ display:'flex', gap:16, flexWrap:'wrap', fontSize:11, color:'var(--smoke)' }}>
                <span>Activo: <span className="mono" style={{ color:'var(--chalk)' }}>{alert.assetId}</span>
                  {asset && ` — ${asset.desc}`}
                </span>
                <span>Reportado por: {alert.technician}</span>
                <span>{fmtDate(alert.date)}</span>
              </div>
            </div>
            <div style={{ display:'flex', flexDirection:'column', gap:6, flexShrink:0 }}>
              {asset && (
                <button className="btn btn-ghost btn-sm"
                  onClick={() => setSelectedAsset(asset)}>
                  <Icon name="Eye" size={12} /> Ver activo
                </button>
              )}
              {alert.status === 'activa' && (
                <button className="btn btn-ghost btn-sm"
                  style={{ color:'var(--risk-low)', borderColor:'rgba(20,168,74,.3)' }}
                  onClick={() => markResolved(alert.id)}>
                  <Icon name="Check" size={12} /> Atendida
                </button>
              )}
            </div>
          </div>
        );
      })}
    </div>
  );
}

/* ===================== DOCUMENTS ===================== */
function DocumentsPanel({ assets, documents }) {
  const [activeTab, setActiveTab] = useState('informe');

  const TABS = [
    { id:'informe',       label:'Informes de Inspección' },
    { id:'certificado',   label:'Certificados de Calibración' },
    { id:'hv-qsa',        label:'Hojas de Vida QSA' },
    { id:'procedimiento', label:'Procedimientos' },
    { id:'certificacion', label:'Certificaciones Personal' },
  ];
  const DOC_ICONS = {
    informe:'File', certificado:'Check', 'hv-qsa':'Activity',
    procedimiento:'Layers', certificacion:'ShieldAlert'
  };

  const filtered = documents.filter(d => d.type === activeTab);

  return (
    <div className="page">
      <div className="tab-bar">
        {TABS.map(t => (
          <div key={t.id} className={`tab${activeTab===t.id?' active':''}`}
            onClick={() => setActiveTab(t.id)}>{t.label}</div>
        ))}
      </div>

      <div className="card" style={{ padding:0 }}>
        {filtered.length === 0 ? (
          <div style={{ textAlign:'center', padding:40, color:'var(--smoke)' }}>
            No hay documentos en esta categoría.
          </div>
        ) : (
          <div className="tbl-wrap">
            <table>
              <thead>
                <tr>
                  <th>Documento</th>
                  <th>Activo</th>
                  <th>Fecha</th>
                  <th>Técnica</th>
                  <th>Vigencia</th>
                  <th></th>
                </tr>
              </thead>
              <tbody>
                {filtered.map(doc => {
                  const asset = assets.find(a => a.id === doc.assetId);
                  return (
                    <tr key={doc.id}>
                      <td>
                        <div style={{ display:'flex', alignItems:'center', gap:10 }}>
                          <Icon name={DOC_ICONS[doc.type] || 'File'} size={16} color="var(--smoke)" />
                          <span style={{ fontSize:13 }}>{doc.name}</span>
                        </div>
                      </td>
                      <td className="mono" style={{ color:'var(--smoke)' }}>
                        {doc.assetId !== 'N/A' ? doc.assetId : '—'}
                        {asset && <div style={{ fontSize:11, color:'var(--smoke)' }}>{asset.desc}</div>}
                      </td>
                      <td className="mono" style={{ whiteSpace:'nowrap', fontSize:11 }}>{fmtDate(doc.date)}</td>
                      <td><span className={`badge ${techBadge(doc.technique.split(' ')[0])}`}>{doc.technique}</span></td>
                      <td>
                        {doc.vigente
                          ? <span className="badge b-aceptable">Vigente</span>
                          : <span className="badge b-rechazo">Vencido</span>
                        }
                      </td>
                      <td>
                        <button className="btn btn-ghost btn-sm"
                          onClick={() => alert(`Descargando: ${doc.name}`)}>
                          <Icon name="Download" size={12} /> Descargar
                        </button>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        )}
      </div>
    </div>
  );
}

/* ===================== ADMIN: UPLOAD ===================== */
function AdminUpload({ assets, inspections, setInspections }) {
  const [form, setForm] = useState({
    client:'Refinería del Norte S.A.', assetId:'', date:'',
    technique:'UT-ESP', technician:'', result:'aceptable',
    norm:'API 570', value:'', notes:''
  });
  const [saved, setSaved] = useState(false);

  const TECHNIQUES = ['UT-ESP','RT-DIG','MT','PT','PAUT','MET','VT-REM','UT-MAP','PMI-XRF'];

  function handleSave(e) {
    e.preventDefault();
    const newId = `OT-${new Date().getFullYear()}-${String(inspections.length + 1).padStart(3,'0')}`;
    setInspections(prev => [{
      id:newId, date:form.date, assetId:form.assetId,
      technique:form.technique, technician:form.technician,
      result:form.result, norm:form.norm,
      value: form.notes ? `${form.value} — ${form.notes}` : form.value
    }, ...prev]);
    setSaved(true);
    setTimeout(() => setSaved(false), 3000);
    setForm(prev => ({ ...prev, assetId:'', date:'', technician:'', value:'', notes:'' }));
  }

  return (
    <div className="page" style={{ maxWidth:680 }}>
      <div className="h2 mb-8">Registrar Nueva Inspección</div>
      <div style={{ color:'var(--smoke)', fontSize:13, marginBottom:24 }}>
        Carga una nueva inspección al portal. El registro actualiza inmediatamente el historial del cliente.
      </div>

      {saved && (
        <div style={{ background:'rgba(20,168,74,.12)', border:'1px solid rgba(20,168,74,.3)',
          borderRadius:4, padding:'12px 16px', marginBottom:20,
          display:'flex', gap:10, alignItems:'center' }}>
          <Icon name="Check" size={16} color="var(--risk-low)" />
          <span style={{ color:'var(--risk-low)', fontSize:13 }}>
            Inspección registrada exitosamente.
          </span>
        </div>
      )}

      <div className="card">
        <form onSubmit={handleSave}>
          <div className="g2">
            <div className="form-group">
              <label className="form-label">Cliente</label>
              <select className="form-input" value={form.client}
                onChange={e => setForm(p=>({...p, client:e.target.value}))}>
                <option>Refinería del Norte S.A.</option>
                <option>Industrias Metálicas del Caribe</option>
                <option>Planta Cementera Oriental</option>
              </select>
            </div>
            <div className="form-group">
              <label className="form-label">Activo</label>
              <select className="form-input" value={form.assetId} required
                onChange={e => setForm(p=>({...p, assetId:e.target.value}))}>
                <option value="">Seleccionar activo...</option>
                {assets.map(a => <option key={a.id} value={a.id}>{a.id} — {a.desc}</option>)}
              </select>
            </div>
            <div className="form-group">
              <label className="form-label">Fecha de Inspección</label>
              <input type="date" className="form-input" value={form.date} required
                onChange={e => setForm(p=>({...p, date:e.target.value}))} />
            </div>
            <div className="form-group">
              <label className="form-label">Técnica END</label>
              <select className="form-input" value={form.technique}
                onChange={e => setForm(p=>({...p, technique:e.target.value}))}>
                {TECHNIQUES.map(t => <option key={t} value={t}>{t}</option>)}
              </select>
            </div>
            <div className="form-group">
              <label className="form-label">Técnico Certificado</label>
              <input type="text" className="form-input" placeholder="Nombre del técnico" required
                value={form.technician} onChange={e => setForm(p=>({...p, technician:e.target.value}))} />
            </div>
            <div className="form-group">
              <label className="form-label">Resultado</label>
              <select className="form-input" value={form.result}
                onChange={e => setForm(p=>({...p, result:e.target.value}))}>
                <option value="aceptable">Aceptable</option>
                <option value="observacion">Observación</option>
                <option value="rechazo">Rechazo</option>
              </select>
            </div>
            <div className="form-group">
              <label className="form-label">Norma Aplicada</label>
              <input type="text" className="form-input" placeholder="Ej: API 570, ASME B31.3..."
                value={form.norm} onChange={e => setForm(p=>({...p, norm:e.target.value}))} />
            </div>
            <div className="form-group">
              <label className="form-label">Valor / Resultado cuantitativo</label>
              <input type="text" className="form-input" placeholder="Ej: 7.15 mm, Sin indicaciones..."
                value={form.value} onChange={e => setForm(p=>({...p, value:e.target.value}))} />
            </div>
          </div>
          <div className="form-group">
            <label className="form-label">Observaciones adicionales</label>
            <textarea className="form-input" placeholder="Notas, recomendaciones, hallazgos..."
              value={form.notes} onChange={e => setForm(p=>({...p, notes:e.target.value}))} />
          </div>
          <div style={{ display:'flex', gap:10, marginTop:8 }}>
            <button type="submit" className="btn btn-primary">
              <Icon name="Upload" size={14} /> Guardar Inspección
            </button>
            <button type="button" className="btn btn-ghost"
              onClick={() => setForm(p=>({...p, assetId:'', date:'', technician:'', value:'', notes:''}))}>
              Limpiar
            </button>
          </div>
        </form>
      </div>
    </div>
  );
}

/* ===================== APP ROOT ===================== */
function App() {
  const [user,       setUser]       = useState(null);
  const [view,       setView]       = useState('dashboard');
  const [collapsed,  setCollapsed]  = useState(false);
  const [selAsset,   setSelAsset]   = useState(null);
  const [assets,                    ] = useState(ASSETS_INIT);
  const [inspections, setInspections] = useState(INSPECTIONS_INIT);
  const [alerts,      setAlerts]    = useState(ALERTS_INIT);
  const [assetPhotos, setAssetPhotos] = useState({});

  if (!user) return <LoginPage onLogin={setUser} />;

  const sharedProps = { assets, inspections, alerts };

  return (
    <div className="app-shell">
      <Sidebar
        collapsed={collapsed}
        onToggle={() => setCollapsed(c => !c)}
        view={view}
        setView={setView}
        user={user}
        onLogout={() => { setUser(null); setView('dashboard'); }}
      />

      <div className="main">
        <TopBar user={user} view={view} onToggle={() => setCollapsed(c => !c)} />

        <div className="content">
          {view === 'dashboard' &&
            <Dashboard {...sharedProps} setView={setView} setSelectedAsset={setSelAsset} />}

          {view === 'assets' &&
            <AssetList {...sharedProps} setSelectedAsset={setSelAsset} />}

          {view === 'inspections' &&
            <InspectionHistory {...sharedProps} />}

          {view === 'rbi-matrix' &&
            <RBIMatrix {...sharedProps} setSelectedAsset={setSelAsset} setView={setView} />}

          {view === 'thickness' &&
            <ThicknessTrend {...sharedProps} />}

          {view === 'plan' &&
            <InspectionPlan {...sharedProps} plan={PLAN_INIT} />}

          {view === 'alerts' &&
            <AlertsPanel {...sharedProps} setAlerts={setAlerts} setSelectedAsset={setSelAsset} />}

          {view === 'documents' &&
            <DocumentsPanel {...sharedProps} documents={DOCUMENTS_INIT} />}

          {view === 'admin-clients' && user.role === 'admin' &&
            <AdminClients {...sharedProps} />}

          {view === 'admin-upload' && user.role === 'admin' &&
            <AdminUpload {...sharedProps} setInspections={setInspections} />}
        </div>
      </div>

      {/* Asset detail modal */}
      {selAsset &&
        <AssetDetailModal
          asset={selAsset}
          inspections={inspections}
          assetPhotos={assetPhotos}
          setAssetPhotos={setAssetPhotos}
          onClose={() => setSelAsset(null)}
        />
      }
    </div>
  );
}

/* ===================== RENDER ===================== */
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
